<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Permanent Site</title>
    <style>
        /* This CSS handles the "look" inside the HTML file */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 400px;
            text-align: center;
        }

        h1 { color: #764ba2; margin-top: 0; }
        
        p { color: #666; }

        .link-button {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #764ba2;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            transition: transform 0.2s;
        }

        .link-button:hover {
            transform: scale(1.05);
            background-color: #5a377d;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Hello, World!</h1>
        <p>This is a single-file HTML website. It's lightweight, fast, and will stay online as long as your host exists.</p>
        <a href="https://github.com/join" class="link-button">Launch This Site</a>
    </div>

</body>
</html>
