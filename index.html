<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPHALLY.COM | Tournament Registration</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #1e293b;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 450px;
            width: 90%;
            text-align: center;
            border: 1px solid #334155;
        }

        h1 {
            color: #38bdf8;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        p {
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        .btn-register {
            display: block;
            background: #38bdf8;
            color: #0f172a;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s, background 0.2s;
        }

        .btn-register:hover {
            background: #7dd3fc;
            transform: translateY(-3px);
        }

        .info-card {
            background: #334155;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 2rem;
            text-align: left;
        }

        .info-item {
            margin: 8px 0;
            font-size: 0.9rem;
        }

        .status-badge {
            background: #22c55e;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="status-badge">Live Registration</span>
        <h1>MPHALLY.COM</h1>
        <p>Official Tournament Hub</p>

        <div class="info-card">
            <div class="info-item">🏆 <strong>Event:</strong> Upcoming Tournament</div>
            <div class="info-item">📅 <strong>Date:</strong> Check Schedule</div>
            <div class="info-item">📍 <strong>Platform:</strong> Online</div>
        </div>

        <a href="https://forms.google.com" class="btn-register">REGISTER NOW</a>
        
        <p style="margin-top: 1.5rem; font-size: 0.8rem;">
            Registration closes soon!
        </p>
    </div>

</body>
</html>
