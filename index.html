            background: #334155;
            padding: 15px;

            margin-bottom: 2rem;
            text-align: left;
        }

        .info-item {

        }

        .social-icon {
            text-decoration: none;
            color: #94a3b8;
            font-size: 0.8rem;
            transition: color 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .social-icon:hover {
            color: #38bdf8;
        }

        .icon-box {
            width: 45px;
            height: 45px;
            background: #0f172a;
            border-radius: 12px;
